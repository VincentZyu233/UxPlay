name: Build UxPlay

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
    steps:
      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          if [[ "$COMMIT_MSG" == *"build action"* ]] || [[ "$COMMIT_MSG" == *"build release"* ]]; then
             echo "should_build=true" >> "$GITHUB_OUTPUT"
             echo "Build triggered via commit message keyword."
          else
             echo "should_build=false" >> "$GITHUB_OUTPUT"
             echo "No build keyword found in commit message. Skipping build."
          fi

  build-linux:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libssl-dev libplist-dev libavahi-compat-libdnssd-dev \
        libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
        gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-libav

    - name: Build
      run: |
        mkdir build
        cd build
        cmake ..
        make
        
    - name: Get Version
      id: get_version
      run: |
        VERSION=$(grep 'set( UXPLAY_VERSION_STRING' CMakeLists.txt | sed 's/set( UXPLAY_VERSION_STRING "//;s/" )//')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UxPlay-Linux-x64-v${{ env.VERSION }}
        path: build/uxplay

  build-windows:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bonjour SDK
      shell: powershell
      run: |
        # Create SDK directory structure
        $sdkDir = "C:\Program Files\Bonjour SDK"
        New-Item -ItemType Directory -Force -Path "$sdkDir\Include"
        New-Item -ItemType Directory -Force -Path "$sdkDir\Lib\x64"
        
        # Download dns_sd.h from Apple's open source project
        $headerUrl = "https://raw.githubusercontent.com/apple-oss-distributions/mDNSResponder/main/mDNSShared/dns_sd.h"
        Write-Host "Downloading dns_sd.h..."
        Invoke-WebRequest -Uri $headerUrl -OutFile "$sdkDir\Include\dns_sd.h" -UseBasicParsing
        
        # Install Bonjour runtime (contains dnssd.dll)
        Write-Host "Installing Bonjour runtime via Chocolatey..."
        choco install bonjour -y
        
        # Verify dns_sd.h
        if (Test-Path "$sdkDir\Include\dns_sd.h") {
          Write-Host "✅ dns_sd.h downloaded successfully"
        } else {
          Write-Error "❌ Failed to download dns_sd.h"
          exit 1
        }
    
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          make
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-gstreamer
          mingw-w64-x86_64-gst-plugins-base
          mingw-w64-x86_64-gst-plugins-good
          mingw-w64-x86_64-gst-plugins-bad
          mingw-w64-x86_64-gst-plugins-ugly
          mingw-w64-x86_64-gst-libav
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-libplist

    - name: Generate dnssd import library
      shell: msys2 {0}
      run: |
        # Find the dnssd.dll from Bonjour installation
        DNSSD_DLL="/c/Program Files (x86)/Bonjour/dnssd.dll"
        if [ ! -f "$DNSSD_DLL" ]; then
          DNSSD_DLL="/c/Program Files/Bonjour/dnssd.dll"
        fi
        
        if [ -f "$DNSSD_DLL" ]; then
          echo "Found dnssd.dll at: $DNSSD_DLL"
          # Generate .def file from DLL exports
          gendef "$DNSSD_DLL"
          # Generate import library
          dlltool -d dnssd.def -l "/c/Program Files/Bonjour SDK/Lib/x64/dnssd.lib" -D dnssd.dll
          echo "✅ Generated dnssd.lib"
        else
          echo "⚠️ dnssd.dll not found, will rely on CMake to find it"
        fi

    - name: Build
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        cmake .. -G "Unix Makefiles" -DNO_MARCH_NATIVE=ON
        make
        VERSION=$(grep 'set( UXPLAY_VERSION_STRING' ../CMakeLists.txt | sed 's/set( UXPLAY_VERSION_STRING "//;s/" )//')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UxPlay-Windows-x64-v${{ env.VERSION }}
        path: build/uxplay.exe
