name: Build UxPlay

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
    steps:
      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          if [[ "$COMMIT_MSG" == *"build action"* ]] || [[ "$COMMIT_MSG" == *"build release"* ]]; then
             echo "should_build=true" >> "$GITHUB_OUTPUT"
             echo "Build triggered via commit message keyword."
          else
             echo "should_build=false" >> "$GITHUB_OUTPUT"
             echo "No build keyword found in commit message. Skipping build."
          fi
          
          if [[ "$COMMIT_MSG" == *"build release"* ]]; then
             echo "should_release=true" >> "$GITHUB_OUTPUT"
             echo "Release will be created."
          else
             echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libssl-dev libplist-dev libavahi-compat-libdnssd-dev \
        libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
        gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-libav

    - name: Build
      run: |
        mkdir build
        cd build
        cmake ..
        make
        
    - name: Get Version
      id: get_version
      run: |
        VERSION=$(grep 'set( UXPLAY_VERSION_STRING' CMakeLists.txt | sed 's/set( UXPLAY_VERSION_STRING "//;s/" )//')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UxPlay-Linux-x64-v${{ env.VERSION }}
        path: build/uxplay

  build-windows:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bonjour SDK
      shell: powershell
      run: |
        # Create SDK directory structure
        $sdkDir = "C:\Program Files\Bonjour SDK"
        New-Item -ItemType Directory -Force -Path "$sdkDir\Include"
        New-Item -ItemType Directory -Force -Path "$sdkDir\Lib\x64"
        
        # Download dns_sd.h from Apple's open source project
        $headerUrl = "https://raw.githubusercontent.com/apple-oss-distributions/mDNSResponder/main/mDNSShared/dns_sd.h"
        Write-Host "Downloading dns_sd.h..."
        Invoke-WebRequest -Uri $headerUrl -OutFile "$sdkDir\Include\dns_sd.h" -UseBasicParsing
        
        # Try multiple methods to get Bonjour/dnssd.dll
        Write-Host "Installing Bonjour runtime..."
        
        # Method 1: Try winget first
        try {
          winget install --id Apple.Bonjour --silent --accept-package-agreements --accept-source-agreements
          Write-Host "✅ Installed via winget"
        } catch {
          Write-Host "winget failed, trying alternative..."
        }
        
        # Method 2: Download Bonjour Print Services directly from Apple
        if (-not (Test-Path "C:\Program Files\Bonjour\mdnsNSP.dll")) {
          Write-Host "Downloading Bonjour Print Services..."
          $bonjourUrl = "https://download.info.apple.com/Mac_OS_X/061-8098.20100603.gthyu/BonjourPSSetup.exe"
          $installerPath = "$env:TEMP\BonjourPSSetup.exe"
          
          # Try curl (more reliable than Invoke-WebRequest for some servers)
          curl.exe -L -o $installerPath "https://support.apple.com/downloads/DL999/en_US/BonjourPSSetup.exe" --retry 3
          
          if (Test-Path $installerPath) {
            Write-Host "Running Bonjour installer..."
            Start-Process -FilePath $installerPath -ArgumentList "/quiet", "/norestart" -Wait -ErrorAction SilentlyContinue
          }
        }
        
        # Verify dns_sd.h
        if (Test-Path "$sdkDir\Include\dns_sd.h") {
          Write-Host "✅ dns_sd.h downloaded successfully"
        } else {
          Write-Error "❌ Failed to download dns_sd.h"
          exit 1
        }
    
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          make
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-tools-git
          mingw-w64-x86_64-gstreamer
          mingw-w64-x86_64-gst-plugins-base
          mingw-w64-x86_64-gst-plugins-good
          mingw-w64-x86_64-gst-plugins-bad
          mingw-w64-x86_64-gst-plugins-ugly
          mingw-w64-x86_64-gst-libav
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-libplist

    - name: Generate dnssd import library
      shell: msys2 {0}
      run: |
        echo "=== Checking for dnssd.dll ==="
        
        # Check known locations only (don't scan entire disk!)
        DNSSD_DLL=""
        for path in \
          "/c/Program Files (x86)/Bonjour/dnssd.dll" \
          "/c/Program Files/Bonjour/dnssd.dll" \
          "/c/Windows/System32/dnssd.dll" \
          "/c/Windows/SysWOW64/dnssd.dll"
        do
          if [ -f "$path" ]; then
            DNSSD_DLL="$path"
            break
          fi
        done
        
        # Debug: show what's in Bonjour dir
        echo "=== Bonjour directory contents ==="
        ls -la "/c/Program Files (x86)/Bonjour/" 2>/dev/null || echo "(x86) not found"
        ls -la "/c/Program Files/Bonjour/" 2>/dev/null || echo "(x64) not found"
        
        if [ -n "$DNSSD_DLL" ]; then
          echo "Found dnssd.dll at: $DNSSD_DLL"
          gendef "$DNSSD_DLL"
          dlltool -d dnssd.def -l dnssd.a -D dnssd.dll
          cp dnssd.a "/c/Program Files/Bonjour SDK/Lib/x64/dnssd.lib"
          cp dnssd.a "/c/Program Files/Bonjour SDK/Lib/x64/dnssd.a"
          ls -la "/c/Program Files/Bonjour SDK/Lib/x64/"
          echo "✅ Generated dnssd import library"
        else
          echo "⚠️ dnssd.dll not found, creating stub library..."
          # Create a minimal .def file for dnssd
          echo "LIBRARY dnssd.dll" > dnssd.def
          echo "EXPORTS" >> dnssd.def
          echo "  DNSServiceRefSockFD" >> dnssd.def
          echo "  DNSServiceProcessResult" >> dnssd.def
          echo "  DNSServiceRefDeallocate" >> dnssd.def
          echo "  DNSServiceRegister" >> dnssd.def
          echo "  DNSServiceBrowse" >> dnssd.def
          echo "  DNSServiceResolve" >> dnssd.def
          echo "  DNSServiceGetAddrInfo" >> dnssd.def
          echo "  TXTRecordCreate" >> dnssd.def
          echo "  TXTRecordDeallocate" >> dnssd.def
          echo "  TXTRecordSetValue" >> dnssd.def
          echo "  TXTRecordGetLength" >> dnssd.def
          echo "  TXTRecordGetBytesPtr" >> dnssd.def
          dlltool -d dnssd.def -l dnssd.a -D dnssd.dll
          cp dnssd.a "/c/Program Files/Bonjour SDK/Lib/x64/dnssd.lib"
          cp dnssd.a "/c/Program Files/Bonjour SDK/Lib/x64/dnssd.a"
          echo "✅ Created stub dnssd import library (user must install Bonjour runtime)"
        fi

    - name: Build
      shell: msys2 {0}
      run: |
        mkdir build
        cd build
        cmake .. -G "Unix Makefiles" -DNO_MARCH_NATIVE=ON
        make
        VERSION=$(grep 'set( UXPLAY_VERSION_STRING' ../CMakeLists.txt | sed 's/set( UXPLAY_VERSION_STRING "//;s/" )//')
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Collect Dependencies
      shell: msys2 {0}
      run: |
        mkdir -p dist
        cp build/uxplay.exe dist/
        
        # Copy required DLLs from MSYS2
        echo "Collecting DLL dependencies..."
        
        # Use ldd to find dependencies and copy them
        ldd build/uxplay.exe | grep "=> /mingw64" | awk '{print $3}' | while read dll; do
          echo "Copying: $dll"
          cp "$dll" dist/
        done
        
        # Also need GStreamer plugins
        mkdir -p dist/lib/gstreamer-1.0
        
        # Copy essential GStreamer plugins
        GST_PLUGIN_DIR="/mingw64/lib/gstreamer-1.0"
        ESSENTIAL_PLUGINS="
          libgstcoreelements.dll
          libgstplayback.dll
          libgstautodetect.dll
          libgstaudioconvert.dll
          libgstaudioresample.dll
          libgstvideoconvertscale.dll
          libgstvideorate.dll
          libgstvolume.dll
          libgstlevel.dll
          libgstaudioparsers.dll
          libgstapp.dll
          libgsttypefindfunctions.dll
          libgstvideoparsersbad.dll
          libgstlibav.dll
          libgstd3d11.dll
          libgstwasapi.dll
          libgstwasapi2.dll
          libgstopus.dll
          libgstaac.dll
          libgstfdkaac.dll
          libgstx264.dll
          libgstx265.dll
          libgstopenh264.dll
          libgstvpx.dll
          libgstavi.dll
          libgstmatroska.dll
          libgstisomp4.dll
          libgstaudiotestsrc.dll
          libgstvideotestsrc.dll
          libgstgio.dll
          libgsttcp.dll
          libgstudp.dll
          libgstrtp.dll
          libgstrtpmanager.dll
          libgstrtsp.dll
        "
        for plugin in $ESSENTIAL_PLUGINS; do
          if [ -f "$GST_PLUGIN_DIR/$plugin" ]; then
            cp "$GST_PLUGIN_DIR/$plugin" dist/lib/gstreamer-1.0/
            echo "Copied plugin: $plugin"
          fi
        done
        
        # Copy GStreamer plugin dependencies
        for dll in dist/lib/gstreamer-1.0/*.dll; do
          ldd "$dll" 2>/dev/null | grep "=> /mingw64" | awk '{print $3}' | while read dep; do
            if [ ! -f "dist/$(basename $dep)" ]; then
              cp "$dep" dist/ 2>/dev/null || true
            fi
          done
        done
        
        # Copy Bonjour DLL
        cp "/c/Program Files (x86)/Bonjour/dnssd.dll" dist/ 2>/dev/null || \
        cp "/c/Program Files/Bonjour/dnssd.dll" dist/ 2>/dev/null || \
        echo "Warning: dnssd.dll not copied"
        
        # Create a batch file to set environment and run
        cat > dist/run_uxplay.bat << 'EOF'
        @echo off
        set GST_PLUGIN_PATH=%~dp0lib\gstreamer-1.0
        set PATH=%~dp0;%PATH%
        start "" "%~dp0uxplay.exe" %*
        EOF
        
        echo "=== Distribution contents ==="
        ls -la dist/
        ls -la dist/lib/gstreamer-1.0/ 2>/dev/null || echo "No GStreamer plugins dir"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UxPlay-Windows-x64-v${{ env.VERSION }}
        path: dist/

  release:
    needs: [check, build-linux, build-windows]
    if: needs.check.outputs.should_release == 'true'
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Get Version
      id: get_version
      run: |
        VERSION=$(grep 'set( UXPLAY_VERSION_STRING' CMakeLists.txt | sed 's/set( UXPLAY_VERSION_STRING "//;s/" )//')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: UxPlay-Linux-x64-v${{ env.VERSION }}
        path: release/linux

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: UxPlay-Windows-x64-v${{ env.VERSION }}
        path: release/windows

    - name: Prepare Release Assets
      run: |
        cd release
        mv linux/uxplay uxplay-linux-x64
        chmod +x uxplay-linux-x64
        
        # Create Windows zip with all dependencies
        cd windows
        zip -r ../uxplay-windows-x64.zip .
        cd ..
        
        echo "=== Release assets ==="
        ls -la

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: UxPlay v${{ env.VERSION }}
        body: |
          ## UxPlay v${{ env.VERSION }}
          
          ### Downloads
          - **Linux (x64)**: `uxplay-linux-x64` (single binary, requires system GStreamer & Avahi)
          - **Windows (x64)**: `uxplay-windows-x64.zip` (includes all dependencies)
          
          ### Windows Usage
          1. Download and extract the zip
          2. Install [Bonjour Print Services](https://support.apple.com/kb/DL999) (if not already installed)
          3. Run `run_uxplay.bat` or `uxplay.exe` directly
          
          ### Linux Usage
          ```bash
          chmod +x uxplay-linux-x64
          ./uxplay-linux-x64
          ```
          Requires: `libgstreamer1.0-0`, `gstreamer1.0-plugins-*`, `libavahi-compat-libdnssd1`
        files: |
          release/uxplay-linux-x64
          release/uxplay-windows-x64.zip
        draft: false
        prerelease: false
